<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — NimbusTech</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; gap: 1rem; }
    .error-code { font-size: 8rem; font-weight: 800; color: var(--clr-primary); line-height: 1; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p style="color: var(--clr-muted)">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn--primary" style="margin-top:1rem">← Back to Home</a>
  </div>
</body>
</html>
